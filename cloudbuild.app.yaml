timeout: "3600s"

logsBucket: "gs://bfsi-policy-dev-001-cloudbuild-logs"

options:
  logging: GCS_ONLY
  machineType: "E2_HIGHCPU_8"
  substitutionOption: ALLOW_LOOSE
  dynamicSubstitutions: true

substitutions:
  _REGION: "us-central1"
  _AR_REPO: "genai-dev"
  _SERVICE_NAME: "bfsi-genai-app"
  _RUN_SA: "sa-cloudrun-runtime@bfsi-policy-dev-001.iam.gserviceaccount.com"
  _IMAGE_NAME: "bfsi-app"

steps:
  - id: "Show build context"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "PROJECT_ID=$PROJECT_ID"
        echo "COMMIT_SHA=$COMMIT_SHA"
        echo "BRANCH_NAME=$BRANCH_NAME"
        echo "REGION=${_REGION}"
        echo "SERVICE=${_SERVICE_NAME}"

  - id: "Install Python dependencies"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r app/requirements.txt

  - id: "Validate application files"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python -m py_compile app/*.py
        test -f Dockerfile
        test -f app/main.py
        echo "Validation successful"

  - id: "Build container image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"
      - "."

  - id: "Push commit-tagged image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"

  - id: "Push latest image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"

  - id: "Deploy to Cloud Run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --project=$PROJECT_ID \
          --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA \
          --service-account=${_RUN_SA} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=2Gi \
          --cpu=2 \
          --timeout=300 \
          --concurrency=20 \
          --max-instances=10 \
          --set-env-vars=PROJECT_ID=$PROJECT_ID,REGION=${_REGION}

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"
