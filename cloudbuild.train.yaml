timeout: "86400s"

serviceAccount: "projects/$PROJECT_ID/serviceAccounts/sa-cloudbuild-cicd@$PROJECT_ID.iam.gserviceaccount.com"

logsBucket: "gs://$PROJECT_ID-cloudbuild-logs"

options:
  logging: GCS_ONLY
  machineType: "E2_HIGHCPU_8"
  substitutionOption: ALLOW_LOOSE
  dynamicSubstitutions: true

substitutions:
  _REGION: "us-central1"
  _AR_REPO: "bfsi-repo"
  _SERVICE_NAME: "bfsi-genai-app"
  _RUN_SA: "sa-cloudrun-runtime@$PROJECT_ID.iam.gserviceaccount.com"
  _IMAGE_NAME: "bfsi-app"
  _DATA_BUCKET: "$PROJECT_ID-bfsi-artifacts"
  _TRAIN_FILE: "training_data/train.jsonl"
  _VAL_FILE: "training_data/val.jsonl"
  _MODEL_REF_SECRET: "bfsi-tuned-model-ref"

steps:
  - id: "Show build context"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "PROJECT_ID=$PROJECT_ID"
        echo "REGION=${_REGION}"
        echo "DATA_BUCKET=${_DATA_BUCKET}"

  - id: "Install Python deps"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --no-cache-dir -r app/requirements.txt
        pip install --no-cache-dir google-cloud-storage google-cloud-secret-manager google-cloud-aiplatform requests pyyaml

  - id: "Validate dataset"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python training_data/schema_checks.py \
          --train ${_TRAIN_FILE} \
          --val ${_VAL_FILE}

  - id: "Upload dataset to GCS"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gsutil cp ${_TRAIN_FILE} gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/train.jsonl
        gsutil cp ${_VAL_FILE} gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/val.jsonl
        gsutil cp prompts/system_prompt.txt gs://${_DATA_BUCKET}/prompts/${COMMIT_SHA}/system_prompt.txt
        gsutil cp prompts/guardrails.yaml gs://${_DATA_BUCKET}/prompts/${COMMIT_SHA}/guardrails.yaml

  - id: "Submit Vertex AI tuning job"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PROJECT_ID=$PROJECT_ID
        export REGION=${_REGION}
        export TRAIN_URI=gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/train.jsonl
        export VAL_URI=gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/val.jsonl
        export MODEL_REF_SECRET=${_MODEL_REF_SECRET}
        python tuning/submit_tuning_job.py

  - id: "Wait for tuning completion"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PROJECT_ID=$PROJECT_ID
        export REGION=${_REGION}
        export MODEL_REF_SECRET=${_MODEL_REF_SECRET}
        python tuning/wait_for_tuning.py

  - id: "Evaluate tuned model"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PROJECT_ID=$PROJECT_ID
        export REGION=${_REGION}
        export MODEL_REF_SECRET=${_MODEL_REF_SECRET}
        python tuning/evaluate_tuned_model.py

  - id: "Write model ref to Secret Manager"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PROJECT_ID=$PROJECT_ID
        export REGION=${_REGION}
        export MODEL_REF_SECRET=${_MODEL_REF_SECRET}
        python tuning/write_model_ref.py

  - id: "Build app image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"
      - "."

  - id: "Push commit image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"

  - id: "Push latest image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"

  - id: "Read tuned model ref"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        MODEL_REF=$(gcloud secrets versions access latest \
          --secret=${_MODEL_REF_SECRET} \
          --project=$PROJECT_ID)
        echo "$MODEL_REF" > /workspace/model_ref.txt
        echo "Model ref captured"

  - id: "Deploy Cloud Run with tuned model"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        MODEL_REF=$(cat /workspace/model_ref.txt)

        gcloud run deploy ${_SERVICE_NAME} \
          --project=$PROJECT_ID \
          --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA \
          --service-account=${_RUN_SA} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=2Gi \
          --cpu=2 \
          --timeout=300 \
          --concurrency=20 \
          --set-env-vars=PROJECT_ID=$PROJECT_ID,REGION=${_REGION},TUNED_MODEL_REF=$MODEL_REF

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"
