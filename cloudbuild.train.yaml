timeout: "86400s"

logsBucket: "gs://bfsi-policy-dev-001-cloudbuild-logs"

options:
  logging: GCS_ONLY
  machineType: "E2_HIGHCPU_8"
  substitutionOption: ALLOW_LOOSE
  dynamicSubstitutions: true

substitutions:
  _REGION: "us-central1"
  _AR_REPO: "bfsi-repo"
  _SERVICE_NAME: "bfsi-genai-app"
  _RUN_SA: "sa-cloudrun-runtime@bfsi-policy-dev-001.iam.gserviceaccount.com"
  _IMAGE_NAME: "bfsi-app"
  _DATA_BUCKET: "bfsi-policy-dev-001-artifacts"
  _TRAIN_FILE: "training_data/train.jsonl"
  _VAL_FILE: "training_data/val.jsonl"
  _MODEL_REF_SECRET: "bfsi-tuned-model-ref"

steps:
  - id: "Show build context"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "PROJECT_ID=$PROJECT_ID"
        echo "COMMIT_SHA=$COMMIT_SHA"
        echo "BRANCH_NAME=$BRANCH_NAME"
        echo "REGION=${_REGION}"
        echo "DATA_BUCKET=${_DATA_BUCKET}"
        echo "TRAIN_FILE=${_TRAIN_FILE}"
        echo "VAL_FILE=${_VAL_FILE}"
        echo "MODEL_REF_SECRET=${_MODEL_REF_SECRET}"

  - id: "Install app dependencies"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python -m pip install --upgrade pip --root-user-action=ignore
        pip install --no-cache-dir --root-user-action=ignore -r app/requirements.txt

  - id: "Validate training dataset"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python training_data/schema_checks.py --file ${_TRAIN_FILE}
        python training_data/schema_checks.py --file ${_VAL_FILE}

  - id: "Upload dataset and prompts to GCS"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gsutil cp ${_TRAIN_FILE} gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/train.jsonl
        gsutil cp ${_VAL_FILE} gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/val.jsonl
        gsutil cp prompts/system_prompt.txt gs://${_DATA_BUCKET}/prompts/${COMMIT_SHA}/system_prompt.txt

        if [ -f prompts/guardrails.yaml ]; then
          gsutil cp prompts/guardrails.yaml gs://${_DATA_BUCKET}/prompts/${COMMIT_SHA}/guardrails.yaml
        else
          echo "prompts/guardrails.yaml not found, skipping optional upload"
        fi

  - id: "Submit Vertex AI tuning job"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python -m pip install --upgrade pip --root-user-action=ignore
        pip install --no-cache-dir --root-user-action=ignore \
          google-cloud-storage \
          google-cloud-secret-manager \
          google-cloud-aiplatform \
          requests \
          pyyaml

        export PROJECT_ID="$PROJECT_ID"
        export REGION="${_REGION}"
        export TRAIN_URI="gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/train.jsonl"
        export VAL_URI="gs://${_DATA_BUCKET}/datasets/${COMMIT_SHA}/val.jsonl"
        export MODEL_REF_SECRET="${_MODEL_REF_SECRET}"

        python tuning/submit_tuning_job.py

  - id: "Wait for tuning completion"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python -m pip install --upgrade pip --root-user-action=ignore
        pip install --no-cache-dir --root-user-action=ignore \
          google-cloud-secret-manager \
          google-cloud-aiplatform \
          requests

        export PROJECT_ID="$PROJECT_ID"
        export REGION="${_REGION}"
        export MODEL_REF_SECRET="${_MODEL_REF_SECRET}"

        python tuning/wait_for_tuning.py

  - id: "Evaluate tuned model"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python -m pip install --upgrade pip --root-user-action=ignore
        pip install --no-cache-dir --root-user-action=ignore \
          google-cloud-secret-manager \
          google-cloud-aiplatform \
          requests \
          pyyaml

        export PROJECT_ID="$PROJECT_ID"
        export REGION="${_REGION}"
        export MODEL_REF_SECRET="${_MODEL_REF_SECRET}"

        python tuning/evaluate_tuned_model.py

  - id: "Write model reference to Secret Manager"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        python -m pip install --upgrade pip --root-user-action=ignore
        pip install --no-cache-dir --root-user-action=ignore \
          google-cloud-secret-manager

        export PROJECT_ID="$PROJECT_ID"
        export REGION="${_REGION}"
        export MODEL_REF_SECRET="${_MODEL_REF_SECRET}"

        python tuning/write_model_ref.py

  - id: "Build application image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"
      - "."

  - id: "Push commit image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"

  - id: "Push latest image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"

  - id: "Read tuned model reference"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud secrets versions access latest \
          --secret="${_MODEL_REF_SECRET}" \
          --project="$PROJECT_ID" > /workspace/model_ref.txt
        echo "Tuned model reference captured"

  - id: "Deploy Cloud Run with tuned model"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA" \
          --service-account="${_RUN_SA}" \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=2Gi \
          --cpu=2 \
          --timeout=300 \
          --concurrency=20 \
          --max-instances=10 \
          --set-env-vars="PROJECT_ID=$PROJECT_ID,REGION=${_REGION},TUNED_MODEL_REF=$(cat /workspace/model_ref.txt)"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"
